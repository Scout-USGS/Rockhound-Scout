<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bug Paint by Number</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#FFF8E7;
    --ink:#2B2B2B;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{
    margin:0; padding:0; height:100%;
    background:var(--cream);
    font-family:'Baloo 2', 'Trebuchet MS', sans-serif;
    color:var(--ink);
    touch-action: manipulation;
    overflow-x:hidden;
  }
  .app{
    display:flex; flex-direction:column; align-items:center;
    min-height:100vh; padding:14px 10px 24px;
  }
  h1{
    font-size:clamp(22px,6vw,32px);
    font-weight:800;
    margin:4px 0 2px;
    text-align:center;
    color:#E63946;
    text-shadow: 2px 2px 0 #fff, 3px 3px 0 rgba(0,0,0,0.08);
  }
  .subtitle{
    font-size:15px; font-weight:700; color:#555; margin-bottom:10px; text-align:center;
  }
  .bug-tabs{
    display:flex; gap:8px; flex-wrap:wrap; justify-content:center;
    margin-bottom:10px;
  }
  .bug-tab{
    font-family:inherit; font-weight:700; font-size:15px;
    border:3px solid var(--ink); border-radius:20px;
    background:#fff; padding:8px 14px;
    cursor:pointer; display:flex; align-items:center; gap:6px;
    transition: transform .12s ease, background .12s ease;
  }
  .bug-tab .emoji{font-size:20px;}
  .bug-tab.active{ background:#FFD23F; transform:translateY(-2px) scale(1.05); }
  .bug-tab:active{ transform:scale(0.95); }

  .canvas-wrap{
    position:relative;
    width:min(92vw, 420px);
    aspect-ratio:1/1;
    background:#fff;
    border-radius:28px;
    border:5px solid var(--ink);
    box-shadow: 0 8px 0 rgba(0,0,0,0.12);
    margin-bottom:14px;
    overflow:hidden;
  }
  svg{ width:100%; height:100%; display:block; }
  .region{
    cursor:pointer;
    transition: fill .15s ease;
    transform-box: fill-box;
    transform-origin: center;
  }
  .region.pop{ animation: pop .35s ease; }
  @keyframes pop{
    0%{ transform:scale(1); }
    40%{ transform:scale(1.08); }
    100%{ transform:scale(1); }
  }
  .region.shake{ animation: shake .4s ease; }
  @keyframes shake{
    0%,100%{ transform:translateX(0); }
    20%{ transform:translateX(-6px); }
    40%{ transform:translateX(6px); }
    60%{ transform:translateX(-4px); }
    80%{ transform:translateX(4px); }
  }
  .fixed{ pointer-events:none; }
  .region-number{
    pointer-events:none;
    font-family:'Baloo 2','Trebuchet MS',sans-serif;
    font-weight:800;
    fill:#777;
    user-select:none;
    transition: opacity .2s ease;
  }

  .celebration{
    position:absolute; inset:0;
    display:none;
    align-items:center; justify-content:center;
    background:rgba(255,255,255,0.55);
    font-size:clamp(22px,7vw,34px);
    font-weight:800;
    color:#E63946;
    text-align:center;
    z-index:5;
    pointer-events:none;
  }
  .celebration.show{ display:flex; animation: fadeIn .3s ease; }
  @keyframes fadeIn{ from{opacity:0;} to{opacity:1;} }
  .confetti{
    position:absolute; top:-20px; width:10px; height:10px; border-radius:3px;
    animation: fall linear forwards;
  }
  @keyframes fall{
    to{ transform: translateY(460px) rotate(360deg); opacity:0.2; }
  }

  .palette{
    display:grid; grid-template-columns: repeat(5, 1fr);
    gap:12px 10px;
    width:min(92vw,420px);
    margin-bottom:14px;
  }
  .swatch{
    width:100%; aspect-ratio:1/1; border-radius:50%;
    border:4px solid var(--ink);
    cursor:pointer;
    position:relative;
    box-shadow: 0 4px 0 rgba(0,0,0,0.15);
    transition: transform .12s ease;
  }
  .swatch:active{ transform:scale(0.9); }
  .swatch.selected{
    outline: 4px solid #E63946;
    outline-offset:3px;
    transform:scale(1.1);
  }
  .badge{
    position:absolute; top:-8px; left:-8px;
    background:#fff; color:var(--ink);
    border:2px solid var(--ink); border-radius:50%;
    width:24px; height:24px;
    display:flex; align-items:center; justify-content:center;
    font-size:13px; font-weight:800;
    font-family:'Baloo 2','Trebuchet MS',sans-serif;
  }
  .swatch.eraser{
    background:
      linear-gradient(135deg, transparent 47%, #E63946 48%, #E63946 52%, transparent 53%),
      #fff;
  }

  .controls{ display:flex; gap:12px; }
  #resetBtn{
    font-family:inherit; font-weight:700; font-size:16px;
    background:#4EA8DE; color:#fff;
    border:3px solid var(--ink); border-radius:18px;
    padding:10px 20px; cursor:pointer;
    box-shadow: 0 4px 0 rgba(0,0,0,0.2);
  }
  #resetBtn:active{ transform:translateY(2px); box-shadow:none; }
</style>
</head>

</div>

        </clipPath>
      </defs>
      <path class="fixed" d="M165,100 L155,72 L180,90 Z" fill="#FFFFFF" stroke="#2B2B2B" stroke-width="5"/>
      <path class="fixed" d="M235,100 L245,72 L220,90 Z" fill="#FFFFFF" stroke="#2B2B2B" stroke-width="5"/>
      <path id="mane" class="region" d="M165,90 L177,55 L189,90 L201,55 L213,90 L225,55 L237,90 Z" fill="#FFFFFF" stroke="#2B2B2B" stroke-width="5"/>
      <circle id="head" class="region" cx="200" cy="140" r="55" fill="#FFFFFF" stroke="#2B2B2B" stroke-width="6"/>
      <ellipse id="bodyBase" class="region" cx="200" cy="280" rx="100" ry="85" fill="#FFFFFF" stroke="#2B2B2B" stroke-width="6"/>
      <g clip-path="url(#zebraClip)">
        <rect id="stripe1" class="region" x="90" y="210" width="220" height="30" fill="#FFFFFF" stroke="#2B2B2B" stroke-width="4"/>
        <rect id="stripe2" class="region" x="90" y="250" width="220" height="30" fill="#FFFFFF" stroke="#2B2B2B" stroke-width="4"/>
        <rect id="stripe3" class="region" x="90" y="290" width="220" height="30" fill="#FFFFFF" stroke="#2B2B2B" stroke-width="4"/>
      </g>
      <ellipse class="fixed" cx="200" cy="280" rx="100" ry="85" fill="none" stroke="#2B2B2B" stroke-width="6"/>
      <rect id="legL" class="region" x="155" y="350" width="30" height="45" rx="10" fill="#FFFFFF" stroke="#2B2B2B" stroke-width="5"/>
      <rect id="legR" class="region" x="215" y="350" width="30" height="45" rx="10" fill="#FFFFFF" stroke="#2B2B2B" stroke-width="5"/>
      <circle class="fixed" cx="180" cy="140" r="6" fill="#2B2B2B"/>
      <circle class="fixed" cx="220" cy="140" r="6" fill="#2B2B2B"/>
      <path class="fixed" d="M188,170 Q200,178 212,170" stroke="#2B2B2B" stroke-width="4" fill="none" stroke-linecap="round"/>
      <path class="fixed" d="M298,270 Q325,275 320,300" stroke="#2B2B2B" stroke-width="5" fill="none" stroke-linecap="round"/>
    `,
    numbers: {
      mane:     {num:7, x:200, y:75,  size:16},
      head:     {num:5, x:200, y:162, size:22},
      bodyBase: {num:5, x:200, y:200, size:18},
      stripe1:  {num:9, x:200, y:225, size:20},
      stripe2:  {num:6, x:200, y:265, size:20},
      stripe3:  {num:9, x:200, y:305, size:20},
      legL:     {num:9, x:170, y:372, size:16},
      legR:     {num:9, x:230, y:372, size:16}
    }
  }
};

const state = {}; // bugId -> {regionId: true} for solved regions
let currentBug = 'ladybug';
Object.keys(BUGS).forEach(id => state[id] = {});

// ---------- Build tabs ----------
const tabsEl = document.getElementById('bugTabs');
Object.entries(BUGS).forEach(([id, bug]) => {
  const btn = document.createElement('button');
  btn.className = 'bug-tab' + (id === currentBug ? ' active' : '');
  btn.dataset.id = id;
  btn.innerHTML = `<span class="emoji">${bug.emoji}</span> ${bug.name}`;
  btn.onclick = () => selectBug(id);
  tabsEl.appendChild(btn);
});

// ---------- Build palette ----------
const paletteEl = document.getElementById('palette');
COLORS.forEach((c, i) => {
  const sw = document.createElement('div');
  sw.className = 'swatch' + (i === 0 ? ' selected' : '');
  sw.style.background = c.hex;
  sw.dataset.hex = c.hex;
  sw.dataset.num = c.num;
  const badge = document.createElement('div');
  badge.className = 'badge';
  badge.textContent = c.num;
  sw.appendChild(badge);
  sw.onclick = () => selectColor(c.hex, c.num, sw);
  paletteEl.appendChild(sw);
});
const eraser = document.createElement('div');
eraser.className = 'swatch eraser';
eraser.dataset.hex = '#FFFFFF';
eraser.dataset.num = 0;
eraser.onclick = () => selectColor('#FFFFFF', 0, eraser);
paletteEl.appendChild(eraser);

function selectColor(hex, num, el){
  currentColor = hex;
  currentNum = num;
  document.querySelectorAll('.swatch').forEach(s => s.classList.remove('selected'));
  el.classList.add('selected');
}

function selectBug(id){
  currentBug = id;
  document.querySelectorAll('.bug-tab').forEach(t => t.classList.toggle('active', t.dataset.id === id));
  renderBug();
}

function renderBug(){
  const bug = BUGS[currentBug];
  const svg = document.getElementById('bugSvg');
  svg.innerHTML = bug.svg;

  // add number labels on top of everything
  Object.entries(bug.numbers).forEach(([regionId, info]) => {
    const t = document.createElementNS(SVGNS, 'text');
    t.setAttribute('x', info.x);
    t.setAttribute('y', info.y);
    t.setAttribute('text-anchor', 'middle');
    t.setAttribute('dominant-baseline', 'middle');
    t.setAttribute('class', 'region-number');
    t.setAttribute('data-region', regionId);
    t.setAttribute('font-size', info.size);
    t.textContent = info.num;
    svg.appendChild(t);
  });

  // reapply solved colors from saved state
  const saved = state[currentBug];
  Object.entries(saved).forEach(([regionId]) => {
    const el = svg.querySelector('#' + regionId);
    const numInfo = bug.numbers[regionId];
    if (el && numInfo) {
      const colorObj = COLORS.find(c => c.num === numInfo.num);
      if (colorObj) el.setAttribute('fill', colorObj.hex);
      const label = svg.querySelector('text[data-region="' + regionId + '"]');
      if (label) label.style.opacity = 0;
    }
  });

  // attach click handlers to fillable regions
  svg.querySelectorAll('.region').forEach(el => {
    el.addEventListener('click', () => {
      const info = bug.numbers[el.id];
      if (!info) return;

      if (currentNum === 0) {
        // eraser: always allowed
        el.setAttribute('fill', '#FFFFFF');
        delete state[currentBug][el.id];
        const label = svg.querySelector('text[data-region="' + el.id + '"]');
        if (label) label.style.opacity = 1;
        return;
      }

      if (currentNum === info.num) {
        el.setAttribute('fill', currentColor);
        state[currentBug][el.id] = true;
        el.classList.remove('pop');
        void el.offsetWidth;
        el.classList.add('pop');
        const label = svg.querySelector('text[data-region="' + el.id + '"]');
        if (label) label.style.opacity = 0;
        checkComplete(svg, bug);
      } else {
        el.classList.remove('shake');
        void el.offsetWidth;
        el.classList.add('shake');
      }
    });
  });

  document.getElementById('celebration').classList.remove('show');
}

function checkComplete(svg, bug){
  const allSolved = Object.keys(bug.numbers).every(id => state[currentBug][id]);
  if (allSolved) celebrate();
}

function celebrate(){
  const cel = document.getElementById('celebration');
  cel.classList.add('show');
  spawnConfetti();
  setTimeout(() => cel.classList.remove('show'), 1800);
}

function spawnConfetti(){
  const wrap = document.querySelector('.canvas-wrap');
  const colors = COLORS.map(c => c.hex);
  for (let i = 0; i < 24; i++){
    const piece = document.createElement('div');
    piece.className = 'confetti';
    piece.style.left = Math.random() * 100 + '%';
    piece.style.background = colors[Math.floor(Math.random()*colors.length)];
    piece.style.animationDuration = (0.9 + Math.random()*0.8) + 's';
    piece.style.zIndex = 6;
    wrap.appendChild(piece);
    setTimeout(() => piece.remove(), 2000);
  }
}

document.getElementById('resetBtn').onclick = () => {
  state[currentBug] = {};
  renderBug();
};

renderBug();
</script>
</body>
</html>
